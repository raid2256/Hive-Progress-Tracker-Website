<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hive Progress Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 40px;
    }
    input {
      padding: 10px;
      font-size: 18px;
      width: 250px;
      border-radius: 6px;
      border: none;
      outline: none;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-left: 10px;
      border: none;
      border-radius: 6px;
      background: #ffcc00;
      cursor: pointer;
    }
    .card {
      background: #222;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      text-align: left;
    }
  </style>
</head>
<body>

  <h1>Hive Progress Tracker</h1>

  <input id="username" placeholder="Enter username">
  <button onclick="loadStats()">Search</button>

  <div id="results"></div>

  <script src="script.js"></script>

</body>
</html>
