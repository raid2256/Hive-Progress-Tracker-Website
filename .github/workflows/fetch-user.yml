name: Fetch Hive Stats

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Extract username
      id: extract
      run: |
        USER=$(echo "${{ github.event.issue.title }}" | sed 's/FETCH://')
        echo "USER=$USER" >> $GITHUB_ENV

    - name: Fetch Hive Stats
      run: |
        mkdir -p data
        curl -s "https://api.playhive.com/v0/game/all/all/${USER}" > data/${USER}.json

    - name: Commit results
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add data/${USER}.json
        git commit -m "Updated stats for ${USER}" || echo "No changes"
        git push

    - name: Close issue
      run: |
        curl -X PATCH \
        -H "Accept: application/vnd.github+json" \
        -d '{"state":"closed"}' \
        https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}
