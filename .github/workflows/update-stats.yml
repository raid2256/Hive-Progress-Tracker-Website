name: Update Hive Stats

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Fetch Hive Stats
      run: |
        USER="AwtBear19"
        mkdir -p data
        curl -s "https://api.playhive.com/v0/game/all/all/$USER" > data/$USER.json

    - name: Commit changes
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add data/*.json
        git commit -m "Update stats" || echo "No changes"
        git push
