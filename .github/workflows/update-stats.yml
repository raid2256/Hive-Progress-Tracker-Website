name: Fetch Hive User Stats

on:
  push:
    paths:
      - "search.txt"

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Read username
      id: readuser
      run: echo "USER=$(cat search.txt)" >> $GITHUB_ENV

    - name: Fetch Hive Stats
      run: |
        mkdir -p data
        curl -s "https://api.playhive.com/v0/game/all/all/${USER}" > data/${USER}.json

    - name: Commit results
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add data/${USER}.json
        git commit -m "Updated stats for ${USER}" || echo "No changes"
        git push
